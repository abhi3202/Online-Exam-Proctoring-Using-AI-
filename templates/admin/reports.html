<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Registered Students</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="page-center">
    <div class="container">
        <h1>Registered Students</h1>
        <p><a href="{{ url_for('admin_dashboard') }}">← Back to dashboard</a></p>

        <table class="table">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
            </tr>
            {% for u in users %}
            <tr>
                <td>{{ u[0] }}</td>
                <td>{{ u[1] }}</td>
                <td>{{ u[2] }}</td>
                <td>{{ u[3] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
