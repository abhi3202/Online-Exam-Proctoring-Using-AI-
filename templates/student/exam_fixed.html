<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Proctoring Exam - {{ exam_id }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .exam-container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 30px; height: 85vh; }
        .main-panel { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow-y: auto; position: relative; }
        .main-panel.disabled { opacity: 0.6; pointer-events: none; }
        .main-panel.disabled::before { content: '⏳ Waiting for Video Proctoring'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,255,255,0.9); padding: 30px; border-radius: 15px; font-size: 20px; font-weight: 600; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .sidebar { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 20px; height: fit-content; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #e5e7eb; padding-bottom: 20px; }
        .exam-title { font-size: 28px; font-weight: 700; color: #1f2937; }
        .exam-meta { display: flex; gap: 20px; align-items: center; }
        .student-info { font-size: 16px; color: #6b7280; }
        .timer-display { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; padding: 15px 25px; border-radius: 15px; font-size: 24px; font-weight: 700; min-width: 120px; text-align: center; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3); }
        .question-nav { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .nav-btn { width: 45px; height: 45px; border: 2px solid #d1d5db; background: white; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .nav-btn:hover { border-color: #3b82f6; background: #eff6ff; transform: scale(1.05); }
        .nav-btn.active { border-color: #3b82f6; background: #3b82f6; color: white; }
        .nav-btn.answered { border-color: #10b981; background: #d1fae5; }
        .question-container { min-height: 400px; }
        .question-card { background: #f9fafb; border: 2px solid #e5e7eb; border-radius: 15px; padding: 30px; margin-bottom: 20px; }
        .question-header { display: flex; align-items: center; margin-bottom: 25px; }
        .question-number { background: #3b82f6; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; margin-right: 20px; }
        .question-title { font-size: 22px; font-weight: 600; color: #111827; line-height: 1.5; }
        .nav-buttons { display: flex; gap: 15px; margin-bottom: 25px; }
        .nav-btn-prev, .nav-btn-next { padding: 12px 24px; border: 2px solid #3b82f6; background: white; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .nav-btn-prev:hover, .nav-btn-next:hover { background: #3b82f6; color: white; }
        .nav-btn-prev:disabled, .nav-btn-next:disabled { opacity: 0.5; cursor: not-allowed; }
        .options { display: flex; flex-direction: column; gap: 15px; }
        .option { padding: 20px; background: white; border: 2px solid #e5e7eb; border-radius: 12px; cursor: pointer; transition: all 0.2s; position: relative; }
        .option:hover { border-color: #3b82f6; box-shadow: 0 5px 15px rgba(59,130,246,0.1); transform: translateY(-2px); }
        .option.selected { border-color: #3b82f6 !important; background: #eff6ff !important; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        .option input[type="radio"] { display: none; }
        .proctoring-header { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; padding: 20px; border-radius: 15px 15px 0 0; text-align: center; font-weight: 600; font-size: 18px; }
        .video-container { background: #000; border-radius: 0 0 15px 15px; overflow: hidden; height: 280px; position: relative; }
        .video-status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 8px 12px; border-radius: 20px; font-size: 14px; font-weight: 500; }
        .btn-start { width: 100%; padding: 18px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 15px; }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(59,130,246,0.4); }
        .btn-start:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-submit { width: 100%; padding: 20px; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: 700; cursor: pointer; margin-top: 30px; transition: all 0.3s; }
        .btn-submit:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(16,185,129,0.4); }
        .btn-submit:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }
        @media (max-width: 1024px) { .exam-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="exam-container">
        <div class="main-panel">
            <div class="header">
                <div class="exam-title">
                    <i class="fas fa-graduation-cap"></i>
                    Proctoring Exam <span id="exam-title">{{ exam_id }}</span>
                </div>
                <div class="exam-meta">
                    <div class="student-info">
                        <i class="fas fa-user"></i> ID: <span id="student-id">{{ student_id }}</span>
                    </div>
                    <div class="timer-display" id="timer">02:00</div>
                </div>
            </div>
            
            <div class="question-nav" id="question-nav">
                <!-- Navigation buttons generated by JS -->
            </div>
            
            <div class="question-container" id="question-container">
                <!-- Questions loaded by JS -->
            </div>
            
            <button class="btn-submit" id="submit-exam" disabled>
                <i class="fas fa-paper-plane"></i> Submit Exam
            </button>
        </div>
        
        <div class="sidebar">
            <div class="proctoring-header">
                <i class="fas fa-video"></i> Live Proctoring 
                <span id="proctor-status">Not Started</span>
            </div>
            
            <div class="video-container">
                <div id="video-status" style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 20px; font-weight: 500;">
                    Click to Start Video
                </div>
                <img id="proctor-video" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;" crossorigin="anonymous">
            </div>
            
            <button class="btn-start" id="start-proctoring">
                🎥 Start Video Proctoring
            </button>
            
            <div id="connection-status" style="text-align: center; margin-top: 15px; font-size: 14px; color: #6b7280; display: none;">
                Video ready - Exam unlocked
            </div>
        </div>
    </div>

    <script>
        const studentId = "{{ student_id }}";
        const examId = "{{ exam_id }}";
        const TOTAL_QUESTIONS = 10;
        const DURATION_MS = 120 * 1000; // 2 minutes
        let currentQuestion = 0;
        let answers = new Array(TOTAL_QUESTIONS).fill(null);
        let examStartTime = null;
        let timerInterval = null;
        let proctoringActive = false;
        let videoReady = false;
        // FIXED: Store shuffled options per question to prevent jumbling
        let shuffledOptionCache = new Array(TOTAL_QUESTIONS).fill(null);

        const questions = [
            {
                question: "What is the primary purpose of AI proctoring systems?",
                options: ["Monitor student behavior during online exams", "Grade student answers automatically", "Create exam questions", "Manage student registration"],
                correctIndex: 0
            },
            // ... (same 10 questions)
            {
                question: "Which model detects prohibited objects like phones?",
                options: ["YOLOv8 nano", "MediaPipe Face Mesh", "RetinaFace", "OpenCV Haar Cascade"],
                correctIndex: 0
            },
            {
                question: "What MediaPipe solution tracks eye gaze?",
                options: ["Face Mesh", "Hands", "Pose", "Iris"],
                correctIndex: 0
            },
            {
                question: "What violation occurs when multiple faces detected?",
                options: ["Impersonation risk", "Phone usage", "Eyes closed", "Tab switching"],
                correctIndex: 0
            },
            {
                question: "How does the system detect tab switching?",
                options: ["VisibilityChange API", "Mouse tracking", "Keyboard logging", "Screen capture"],
                correctIndex: 0
            },
            {
                question: "What threshold determines eyes closed (EAR)?",
                options: ["Less than 0.25", "Greater than 0.5", "Exactly 0.3", "No specific threshold"],
                correctIndex: 0
            },
            {
                question: "Which YOLO version used for objects?",
                options: ["yolov8n.pt", "yolov5s.pt", "yolov3.pt", "yolov7.pt"],
                correctIndex: 0
            },
            {
                question: "What RetinaFace backend for faces?",
                options: ["MobileNet", "ResNet50", "EfficientNet", "Vision Transformer"],
                correctIndex: 0
            },
            {
                question: "Audio analyzer detects what primarily?",
                options: ["Multiple voices/speech", "Background music", "Keyboard typing", "Mouse clicks"],
                correctIndex: 0
            },
            {
                question: "Final evaluation uses human labels from which table?",
                options: ["labeled_sessions", "exams", "students", "violations"],
                correctIndex: 0
            }
        ];

        const questionNav = document.getElementById('question-nav');
        const questionContainer = document.getElementById('question-container');
        const timerEl = document.getElementById('timer');
        const proctorVideo = document.getElementById('proctor-video');
        const startProctorBtn = document.getElementById('start-proctoring');
        const submitBtn = document.getElementById('submit-exam');
        const mainPanel = document.querySelector('.main-panel');
        const videoStatus = document.getElementById('video-status');
        const connectionStatus = document.getElementById('connection-status');
        const proctorStatus = document.getElementById('proctor-status');

        // Fisher-Yates shuffle (deterministic per question when cached)
        function shuffle(array, seed = null) {
            const shuffled = [...array];
            let i = shuffled.length;
            while (i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // FIXED: Get or create shuffled options for question (no re-shuffle)
        function getShuffledOptions(qIndex) {
            if (!shuffledOptionCache[qIndex]) {
                shuffledOptionCache[qIndex] = shuffle(questions[qIndex].options);
            }
            return shuffledOptionCache[qIndex];
        }

        function createNav() {
            questionNav.innerHTML = '';
            for (let i = 0; i < TOTAL_QUESTIONS; i++) {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.textContent = i + 1;
                btn.dataset.q = i;
                btn.onclick = () => goToQuestion(i);
                questionNav.appendChild(btn);
            }
        }

        function goToQuestion(index) {
            currentQuestion = index;
            updateNav();
            renderQuestion();
        }

        function prevQuestion() {
            if (currentQuestion > 0) goToQuestion(currentQuestion - 1);
        }

        function nextQuestion() {
            if (currentQuestion < TOTAL_QUESTIONS - 1) goToQuestion(currentQuestion + 1);
        }

        function updateNav() {
            [...questionNav.children].forEach((btn, i) => {
                btn.classList.toggle('active', i === currentQuestion);
                btn.classList.toggle('answered', answers[i] !== null);
            });
        }

        // FIXED: Render uses cached shuffled options, adds .selected class
        function renderQuestion() {
            const qData = questions[currentQuestion];
            const shuffledOptions = getShuffledOptions(currentQuestion);
            const selectedIndex = answers[currentQuestion];
            
            questionContainer.innerHTML = `
                <div class="question-card">
                    <div class="question-header">
                        <div class="question-number">${currentQuestion + 1}/${TOTAL_QUESTIONS}</div>
                        <div class="question-title">${qData.question}</div>
                    </div>
                    <div class="nav-buttons">
                        <button class="nav-btn-prev" onclick="prevQuestion()" ${currentQuestion === 0 ? 'disabled' : ''}>
                            < Previous
                        </button>
                        <button class="nav-btn-next" onclick="nextQuestion()" ${currentQuestion === TOTAL_QUESTIONS - 1 ? 'disabled' : ''}>
                            Next >
                        </button>
                    </div>
                    <div class="options">
                        ${shuffledOptions.map((option, idx) => {
                            const optLabel = String.fromCharCode(65 + idx); // A,B,C,D
                            const isSelected = selectedIndex === idx;
                            return `
                                <div class="option ${isSelected ? 'selected' : ''}" onclick="selectAnswer(${currentQuestion}, ${idx})">
                                    <span class="option-label">${optLabel}.</span>
                                    <span class="option-text">${option}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
            updateNav();
        }

        // FIXED: No re-render, just update nav + add visual feedback
        function selectAnswer(qIndex, optionIndex) {
            answers[qIndex] = optionIndex;
            updateNav();
            // Visual feedback without re-shuffling
            const currentOptions = document.querySelectorAll('.option');
            currentOptions.forEach((opt, idx) => {
                opt.classList.toggle('selected', idx === optionIndex);
            });
            // Brief highlight
            const selectedOpt = document.querySelector(`.option:nth-child(${optionIndex + 1})`);
            if (selectedOpt) {
                selectedOpt.style.transform = 'scale(1.02)';
                setTimeout(() => selectedOpt.style.transform = '', 200);
            }
        }

        // Block exam until proctoring
        mainPanel.classList.add('disabled');

        startProctorBtn.onclick = async () => {
            startProctorBtn.disabled = true;
            startProctorBtn.textContent = 'Starting...';
            videoStatus.textContent = 'Initializing camera...';

            try {
                const res = await fetch(`/start_proctoring/${studentId}/${examId}`, { method: 'POST' });
                const data = await res.json();

                if (data.status === 'success') {
                    proctorStatus.textContent = 'Active';
                    videoStatus.textContent = 'Connecting video stream...';
                    
                    // FIXED: Proper event order + error recovery
                    proctorVideo.onload = () => {
                        videoStatus.textContent = 'Video ready ✓';
                    };
                    proctorVideo.onloadeddata = () => {
                        videoStatus.textContent = 'Stream active';
                    };
                    proctorVideo.onerror = () => {
                        videoStatus.textContent = 'Stream error - Retrying...';
                        setTimeout(() => {
                            proctorVideo.src = `/video_feed?t=${Date.now()}`;
                        }, 1000);
                    };
                    proctorVideo.onabort = proctorVideo.onerror;
                    
                    proctorVideo.src = `/video_feed?t=${Date.now()}`;
                    
                    setTimeout(() => {  
                        videoReady = true;
                        connectionStatus.style.display = 'block';
                        proctoringActive = true;
                        mainPanel.classList.remove('disabled');
                        createNav();
                        goToQuestion(0);
                        examStartTime = Date.now();
                        timerInterval = setInterval(updateTimer, 1000);
                        submitBtn.disabled = false;
                        videoStatus.textContent = '✅ Proctoring Active';
                    }, 2500);
                } else {
                    videoStatus.textContent = `Error: ${data.message}`;
                    startProctorBtn.disabled = false;
                    startProctorBtn.textContent = 'Retry Proctoring';
                }
            } catch (e) {
                videoStatus.textContent = 'Network error - Check connection';
                startProctorBtn.disabled = false;
                startProctorBtn.textContent = 'Retry';
            }
        };

        function updateTimer() {
            if (!examStartTime) return;
            const elapsed = Date.now() - examStartTime;
            const remaining = DURATION_MS - elapsed;
            if (remaining <= 0) {
                timerEl.textContent = '00:00';
                timerEl.style.background = 'linear-gradient(135deg, #dc2626, #b91c1c)';
                clearInterval(timerInterval);
                submitBtn.disabled = true;
                mainPanel.classList.add('disabled');
                setTimeout(() => {
                    submitExam();
                }, 1000);
                return;
            }
            const mins = Math.floor(remaining / 60000);
            const secs = Math.floor((remaining % 60000) / 1000);
            timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (remaining < 30000) timerEl.style.background = 'linear-gradient(135deg, #f59e0b, #d97706)';
            if (remaining < 10000) timerEl.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
        }

        function submitExam() {
            fetch(`/submit_exam/${studentId}/${examId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ answers })
            }).then(() => {
                window.location.href = `/exam_completed/${studentId}/${examId}`;
            }).catch(e => alert('Submit failed - ' + e.message));
        }

        submitBtn.onclick = submitExam;

        // FIXED: Enhanced tab switch detection (sync with proctoring.js)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && proctoringActive) {
                console.log('Tab switch detected - logging violation');
                fetch(`/log_tab_switch/${studentId}/${examId}`, { 
                    method: 'POST',
                    credentials: 'same-origin' 
                }).catch(e => console.error('Tab log failed:', e));
            }
        });

        // Security: Prevent dev tools
        (function() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.shiftKey && e.key === 'C') || (e.ctrlKey && e.key === 'u')) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
            }, true);
            
            document.addEventListener('contextmenu', e => e.preventDefault());
        })();
    </script>
</body>
</html>
