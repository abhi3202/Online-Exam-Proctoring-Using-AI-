<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Exam - AI Proctoring</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <style>
        body { font-family: Arial, sans-serif; }
        .layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .exam-panel { flex: 2; }
        .video-panel { flex: 1; }
        .question-nav button {
            margin: 2px;
            padding: 4px 8px;
        }
        .question-nav button.active {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Exam: {{ exam_id }}</h1>
    <p>Student ID: {{ student_id }} | Time: <span id="exam-timer">00:00</span></p>

    <div class="layout">
        <!-- Exam questions -->
        <div class="exam-panel">
            <div id="question-container">
                <!-- Question text -->
                <h2 id="question-text"></h2>

                <!-- Options -->
                <div id="options-container"></div>
            </div>

            <!-- Navigation buttons -->
            <div style="margin-top: 20px;">
                <button id="prev-btn">Previous</button>
                <button id="next-btn">Next</button>
                <button id="submit-btn" style="margin-left: 20px;">Submit Exam</button>
            </div>

            <!-- Question number buttons -->
            <div class="question-nav" style="margin-top: 20px;" id="question-nav"></div>
        </div>

        <!-- Proctoring video -->
        <div class="video-panel">
            <h3>Live Proctoring</h3>
            <img
                src="{{ url_for('video_feed') }}"
                width="400"
                alt="Proctoring video feed"
            >
        </div>
    </div>

    <script>
        // Simple sample questions; later you can load from server
        const questions = [
            {
                text: "What is 2 + 2?",
                options: ["1", "2", "3", "4"]
            },
            {
                text: "Capital of India?",
                options: ["Mumbai", "Delhi", "Chennai", "Kolkata"]
            },
            {
                text: "Which language is this project using?",
                options: ["C++", "Python", "Java", "Go"]
            }
        ];

        let currentIndex = 0;
        const answers = new Array(questions.length).fill(null);

        const questionTextEl = document.getElementById("question-text");
        const optionsContainerEl = document.getElementById("options-container");
        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");
        const submitBtn = document.getElementById("submit-btn");
        const navContainerEl = document.getElementById("question-nav");

        function renderQuestion(index) {
            const q = questions[index];
            questionTextEl.textContent = `Q${index + 1}. ${q.text}`;

            optionsContainerEl.innerHTML = "";
            q.options.forEach((opt, i) => {
                const id = `opt_${index}_${i}`;
                const label = document.createElement("label");
                const input = document.createElement("input");
                input.type = "radio";
                input.name = "option";
                input.value = i;
                input.id = id;

                if (answers[index] === i) {
                    input.checked = true;
                }

                input.addEventListener("change", () => {
                    answers[index] = i;
                    updateNavButtons();
                });

                label.appendChild(input);
                label.appendChild(document.createTextNode(" " + opt));
                optionsContainerEl.appendChild(label);
                optionsContainerEl.appendChild(document.createElement("br"));
            });

            updateNavButtons();
        }

        function updateNavButtons() {
            const buttons = navContainerEl.querySelectorAll("button");
            buttons.forEach((btn, idx) => {
                btn.classList.toggle("active", idx === currentIndex);
            });
        }

        function buildQuestionNav() {
            navContainerEl.innerHTML = "";
            for (let i = 0; i < questions.length; i++) {
                const btn = document.createElement("button");
                btn.textContent = i + 1;
                btn.addEventListener("click", () => {
                    currentIndex = i;
                    renderQuestion(currentIndex);
                });
                navContainerEl.appendChild(btn);
            }
        }

        prevBtn.addEventListener("click", () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion(currentIndex);
            }
        });

        nextBtn.addEventListener("click", () => {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion(currentIndex);
            }
        });

        submitBtn.addEventListener("click", () => {
            const unanswered = answers.filter(a => a === null).length;
            if (!confirm(`You have ${unanswered} unanswered question(s). Submit exam?`)) {
                return;
            }

            fetch(`/submit_exam/{{ student_id }}/{{ exam_id }}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    answers: answers
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "ok") {
                    window.location.href = `/exam_completed/{{ student_id }}/{{ exam_id }}`;
                } else {
                    alert("Error submitting exam.");
                }
            })
            .catch(err => {
                console.error(err);
                alert("Network error submitting exam.");
            });
        });

        // Init
        buildQuestionNav();
        renderQuestion(currentIndex);
    </script>
    <script src="{{ url_for('static', filename='js/proctoring.js') }}"></script>
    <iframe src="{{ url_for('video_feed') }}" style="display:none;"></iframe>
</body>
</html>
